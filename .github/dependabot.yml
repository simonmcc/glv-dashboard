version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dashboard-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/scraper"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      scraper-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
